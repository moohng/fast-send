name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync Version
        run: node scripts/sync-version.js ${{ github.ref_name }}

      - name: Build Frontend
        run: npm run build:client

      - name: Build All Desktop Platforms
        run: |
          go install github.com/tc-hib/go-winres@latest
          npm run build:go

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FastSend-Desktop
          path: out/FastSend_v*

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync Version
        run: node scripts/sync-version.js ${{ github.ref_name }}

      - name: Build Frontend
        run: npm run build --workspace=@fast-send/client

      - name: Capacitor Sync
        working-directory: packages/client
        run: npx cap sync android

      - name: Decode Keystore
        run: |
          printf "%s" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > packages/client/android/app/fastsend-release.jks

      - name: Build Android APK
        run: npm run build:release-apk
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastSend-Android
          path: out/FastSend_${{ github.ref_name }}_android_*.apk

  create-release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten and Prepare Files
        run: |
          mkdir -p out
          find all-artifacts -type f -exec cp {} out/ \;
          ls -R out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/FastSend_v*
            out/FastSend_v*.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
