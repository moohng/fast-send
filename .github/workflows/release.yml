name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build --workspace=@fast-send/client

      - name: Copy static files
        run: |
          if (Test-Path packages/server-go/dist) { Remove-Item -Recurse -Force packages/server-go/dist }
          New-Item -ItemType Directory -Force -Path packages/server-go/dist
          Copy-Item -Path packages/client/dist/* -Destination packages/server-go/dist/ -Recurse -Force

      - name: Build Windows Exe
        working-directory: packages/server-go
        run: |
          go install github.com/tc-hib/go-winres@latest
          go-winres make
          go build -ldflags="-s -w -H windowsgui" -o ../../out/FastSend_${{ github.ref_name }}.exe main.go

      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        with:
          files: out/FastSend_${{ github.ref_name }}.exe
          args: --best

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastSend-Windows
          path: out/FastSend_${{ github.ref_name }}.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build --workspace=@fast-send/client

      - name: Capacitor Update
        working-directory: packages/client
        run: npx cap update android

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > packages/client/android/app/fastsend-release.jks

      - name: Build Android APK
        working-directory: packages/client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: mv packages/client/android/app/build/outputs/apk/release/app-release.apk packages/client/android/app/build/outputs/apk/release/FastSend_${{ github.ref_name }}.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastSend-Android
          path: packages/client/android/app/build/outputs/apk/release/FastSend_${{ github.ref_name }}.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unused-trigger
          path: .
        # 这里的下载逻辑在 actions/upload-artifact@v4 中不需要指定 path

      - uses: actions/download-artifact@v4
        with:
          name: FastSend-Windows
          path: out

      - uses: actions/download-artifact@v4
        with:
          name: FastSend-Android
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/FastSend_${{ github.ref_name }}.exe
            out/FastSend_${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
