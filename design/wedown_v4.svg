<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="200" fill="#FFFFFF"/>
  <!-- 重叠的页面/块 -->
  <rect x="250" y="250" width="450" height="450" rx="40" fill="#07C160" opacity="0.3"/>
  <rect x="350" y="350" width="450" height="450" rx="40" fill="#07C160"/>
  <!-- 核心元素：光标插入点，象征排版与写作 -->
  <rect x="420" y="440" width="60" height="270" rx="30" fill="white"/>
  <!-- 辅助装饰线：象征排版对齐 -->
  <rect x="520" y="440" width="200" height="40" rx="20" fill="white" opacity="0.6"/>
  <rect x="520" y="520" width="160" height="40" rx="20" fill="white" opacity="0.4"/>
</svg>
